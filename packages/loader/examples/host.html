<!doctype html>
<html lang="en-ZA">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Izimvo loader — local test host</title>
    <!-- A deliberately hostile host stylesheet, to prove Shadow-DOM isolation. -->
    <style>
      button { background: hotpink !important; font-size: 48px !important; }
      * { color: red !important; }
    </style>
  </head>
  <body>
    <h1>Demo outdoor store</h1>
    <p>Tap the orb (bottom-right) to talk to the adviser.</p>

    <!--
      The embed contract (PLAN §7.1). The loader is served from our backend and
      derives its API base from that origin, so no data-api-base is needed.
      Serve this file from an allowlisted origin (the demo site-key allows
      `localhost`, so `npx serve packages/loader/examples` works) — the browser
      treats localhost as a secure context, which mic/audio require.
    -->
    <script
      src="https://izimvo-backend-production.up.railway.app/v1/loader.js"
      data-site-key="pk_live_demo"
      data-category="trail-running"
      data-locale="en-ZA"
    ></script>
  </body>
</html>
